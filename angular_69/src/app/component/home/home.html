<div class="home-container">
  <!-- Left Side: Booking Panel -->
  <div class="booking-panel">
    <h1 class="brand-logo">RideShare</h1>
    
    <div class="card">
      <h2 class="card-title">Request a ride now</h2>
      
      <div class="input-group">
        <div class="input-field">
          <span class="dot pickup"></span>
          <input type="text" placeholder="Enter pickup location">
        </div>
        <div class="line"></div>
        <div class="input-field">
          <span class="dot destination"></span>
          <input type="text" placeholder="Enter destination">
        </div>
      </div>

      <div class="ride-options">
        <div class="option active">
          <span class="icon">🚗</span>
          <div>
            <p class="name">Economy</p>
            <p class="time">4 min away</p>
          </div>
          <span class="price">$12.00</span>
        </div>
      </div>

      <button class="btn-confirm">Request Ride</button>
    </div>
  </div>

  <!-- Right Side: Map Background -->
  <div class="map-placeholder">
    <!-- This is where your <google-map> component will eventually go -->
    <div class="map-overlay">
      <p>Interactive Map View</p>
    </div>
  </div>
</div>
