<!-- forgot-password.component.html -->
<div class="min-h-screen bg-slate-100 flex items-center justify-center p-6 font-sans">
  <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl">
    <h2 class="text-2xl font-bold text-slate-800 mb-6 text-center">পাসওয়ার্ড পুনরুদ্ধার</h2>

    <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm">{{ errorMessage }}</div>
    <div *ngIf="successMessage" class="mb-4 p-3 bg-green-100 text-green-700 rounded-lg text-sm">{{ successMessage }}</div>

    <!-- স্টেপ ১: ফোন নম্বর এন্ট্রি -->
    <div *ngIf="step === 1">
      <div class="mb-4">
        <label class="block text-slate-600 text-sm font-medium mb-1">আপনার নিবন্ধিত মোবাইল নম্বর</label>
        <input type="text" [(ngModel)]="phone" placeholder="01XXXXXXXXX" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>
      <button (click)="sendOTP()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-lg">ওটিপি পাঠান</button>
    </div>

    <!-- স্টেপ ২: ওটিপি কোড ভেরিফিকেশন -->
    <div *ngIf="step === 2">
      <div class="mb-4">
        <label class="block text-slate-600 text-sm font-medium mb-1">৬-ডিজিটের ওটিপি দিন</label>
        <input type="text" [(ngModel)]="otp" placeholder="XXXXXX" maxLength="6" class="w-full px-4 py-2 border rounded-lg tracking-widest text-center text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>
      <button (click)="verifyOTP()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-lg">কোড যাচাই করুন</button>
    </div>

    <!-- স্টেপ ৩: নতুন পাসওয়ার্ড সেট -->
    <div *ngIf="step === 3">
      <div class="mb-4">
        <label class="block text-slate-600 text-sm font-medium mb-1">নতুন পাসওয়ার্ড</label>
        <input type="password" [(ngModel)]="newPassword" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>
      <div class="mb-4">
        <label class="block text-slate-600 text-sm font-medium mb-1">পাসওয়ার্ড নিশ্চিত করুন</label>
        <input type="password" [(ngModel)]="confirmPassword" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>
      <button (click)="resetPassword()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-lg">পাসওয়ার্ড আপডেট করুন</button>
    </div>

    <p class="text-center text-sm text-slate-600 mt-4"><a routerLink="/login" class="text-indigo-600 font-medium hover:underline">লগইন পেজে ফিরে যান</a></p>
  </div>
</div>
