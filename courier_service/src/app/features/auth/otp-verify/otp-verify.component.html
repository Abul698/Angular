<!-- otp-verify.component.html -->
<div class="min-h-screen bg-slate-100 flex items-center justify-center p-6 font-sans">
  <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl text-center">
    <h2 class="text-2xl font-bold text-slate-800 mb-2">নিরাপত্তা যাচাইকরণ</h2>
    <p class="text-sm text-slate-500 mb-6">আপনার মোবাইলে পাঠানো ৬ ডিজিটের নিরাপত্তা কোডটি প্রদান করুন</p>
    
    <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm text-left">{{ errorMessage }}</div>

    <!-- ৬টি ইন্ডিভিজুয়াল ওটিপি ইনপুট বক্স -->
    <div class="flex justify-center space-x-2 mb-6">
      <input *ngFor="let digit of otpDigits; let i = index" #otpInput type="text" maxLength="1" [(ngModel)]="otpDigits[i]" (input)="onInput($event, i)" (keydown)="onKeyDown($event, i)" class="w-12 h-12 text-center text-xl font-bold border-2 rounded-lg focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition">
    </div>

    <button (click)="verify()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition mb-4">কোড ভেরিফাই করুন</button>

    <!-- কাউন্টডাউন টাইমার ও রিসেন্ড লিঙ্ক -->
    <div class="text-sm text-slate-600 mb-4">
      <span *ngIf="countdown > 0">পুনরায় কোড পাঠান ({{ countdown }} সেকেন্ড পর)</span>
      <button *ngIf="countdown === 0" (click)="resendOTP()" class="text-indigo-600 font-semibold hover:underline">কোড পুনরায় পাঠান</button>
    </div>

    <a routerLink="/login" class="text-sm text-indigo-600 hover:underline">লগইন পেজে ফিরে যান</a>
  </div>
</div>
