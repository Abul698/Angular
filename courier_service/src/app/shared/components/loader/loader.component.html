<div class="loader-overlay d-flex justify-content-center align-items-center position-fixed top-0 start-0 w-100 h-100" *ngIf="isLoading">
  <div class="text-center p-4 bg-white rounded shadow-lg border border-light-subtle d-flex flex-column align-items-center gap-3" style="min-width: 150px;">
    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
      <span class="visually-hidden">Loading...</span>
    </div>
    <span class="text-dark small fw-semibold tracking-wider">Please Wait...</span>
  </div>
</div>
