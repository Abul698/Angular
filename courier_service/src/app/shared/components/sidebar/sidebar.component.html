<div class="sidebar d-flex flex-column bg-dark vh-100 text-white shadow">
  <!-- Menu Header -->
  <div class="sidebar-header p-4 border-bottom border-secondary border-opacity-25">
    <small class="text-uppercase tracking-wider text-muted fw-bold d-block" style="font-size: 0.75rem;">Navigation Menu</small>
  </div>

  <!-- Links List -->
  <ul class="nav nav-pills flex-column mb-auto p-3 gap-1">
    <li class="nav-item" *ngFor="let item of menuItems">
      <a [routerLink]="item.route" 
         routerLinkActive="active" 
         class="nav-link text-white-50 d-flex align-items-center py-2 px-3 rounded gap-3 transition-all">
        <i class="bi {{ item.icon }} fs-5"></i>
        <span class="fw-medium small">{{ item.title }}</span>
      </a>
    </li>
  </ul>
</div>
