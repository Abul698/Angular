<div class="card h-100 shadow-sm border-0">
  <div class="card-body p-4">
    <div class="d-flex justify-content-between align-items-start mb-3">
      <p class="text-muted text-uppercase small fw-semibold mb-0" style="letter-spacing: 0.5px;">
        {{ title }}
      </p>
      <div class="p-2 rounded bg-light d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
        <i [class]="icon + ' ' + colorClass + ' fs-4'"></i>
      </div>
    </div>
    
    <h2 class="display-6 fw-bold text-dark mb-2">{{ value }}</h2>
    
    <div class="d-flex align-items-center gap-2 flex-wrap">
      <span *ngIf="trend" 
            [ngClass]="{ 'text-success': isTrendUp(), 'text-danger': isTrendDown() }" 
            class="fw-bold small d-inline-flex align-items-center">
        <i *ngIf="isTrendUp()" class="bi bi-arrow-up-short fs-5"></i>
        <i *ngIf="isTrendDown()" class="bi bi-arrow-down-short fs-5"></i>
        {{ trendValue }}
      </span>
      <span class="text-muted small">{{ subtitle }}</span>
    </div>
  </div>
</div>
